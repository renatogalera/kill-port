name: Release

on:
  push:
    tags:
      - "v*"
  pull_request:

env:
  ZIG_VERSION: 0.15.2

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        run: |
          curl -fsSLO "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          tar -xf "zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Check Zig version
        run: zig version

      - name: Run tests
        run: zig build test

      - name: Build native release
        run: |
          version_arg=""
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version_arg="-Dversion=${GITHUB_REF_NAME#v}"
          fi
          zig build -Doptimize=ReleaseFast $version_arg

  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            target: x86_64-linux-musl
            archive: kill-port-linux-amd64
            binary: kill-port
          - name: linux-arm64
            target: aarch64-linux-musl
            archive: kill-port-linux-arm64
            binary: kill-port
          - name: macos-amd64
            target: x86_64-macos
            archive: kill-port-macos-amd64
            binary: kill-port
          - name: macos-arm64
            target: aarch64-macos
            archive: kill-port-macos-arm64
            binary: kill-port
          - name: windows-amd64
            target: x86_64-windows-gnu
            archive: kill-port-windows-amd64
            binary: kill-port.exe
          - name: windows-arm64
            target: aarch64-windows-gnu
            archive: kill-port-windows-arm64
            binary: kill-port.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        run: |
          curl -fsSLO "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          tar -xf "zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Build ${{ matrix.target }}
        run: |
          version_arg=""
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version_arg="-Dversion=${GITHUB_REF_NAME#v}"
          fi
          zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast $version_arg

      - name: Package
        run: |
          mkdir -p "dist/${{ matrix.archive }}"
          cp "zig-out/bin/${{ matrix.binary }}" "dist/${{ matrix.archive }}/${{ matrix.binary }}"
          cp README.md LICENSE "dist/${{ matrix.archive }}/"
          tar -C dist -czf "dist/${{ matrix.archive }}.tar.gz" "${{ matrix.archive }}"
          sha256sum "dist/${{ matrix.archive }}.tar.gz" > "dist/${{ matrix.archive }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            dist/${{ matrix.archive }}.tar.gz
            dist/${{ matrix.archive }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - test
      - build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.tar.gz \
            dist/*.tar.gz.sha256 \
            --title "$GITHUB_REF_NAME" \
            --notes "Prebuilt kill-port binaries for Linux, macOS, and Windows."
